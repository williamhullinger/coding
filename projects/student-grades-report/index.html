<!--
Project Name: HTML Table
Purpose: Demonstrate semantic table data structure.

Notes:
- Correct semantic table usage
- Table is a semantic data element
- Used for structured data (rows + columns)
- Not for layout
- <tfoot> is used for summaries (totals, averages)

Real-world uses:
- Reports
- Dashboards
- Financial summaries

future Note:
-learn about the scope attribute that gpt added.
-create a table + CSS reference version.
-->

<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Calculus Final Exams Table</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>
  <body>
    <table>
      <caption>Calculus Final Exam Grades</caption>

      <thead>
        <tr>
          <th scope="col">Last Name</th>
          <th scope="col">First Name</th>
          <th scope="col">Grade</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>Davis</td>
          <td>Alex</td>
          <td>54</td>
        </tr>
        <tr>
          <td>Doe</td>
          <td>Samantha</td>
          <td>92</td>
        </tr>
        <tr>
          <td>Rodriguez</td>
          <td>Marcus</td>
          <td>88</td>
        </tr>
        <tr>
          <td>Thompson</td>
          <td>Jane</td>
          <td>77</td>
        </tr>
        <tr>
          <td>Williams</td>
          <td>Natalie</td>
          <td>83</td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
          <th scope="row" colspan="2">Average Grade</th>
          <td>78.8</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
