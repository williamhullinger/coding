<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Event Hub</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
</head>

<body>

    <header>
        <h1>Event Hub</h1>
        <nav>
            <ul>
                <li> <a href="#upcoming-events">Upcoming Events</a></li>
                <li> <a href="#past-events">Past Events</a></li>
            </ul>    
    </header>   

    <main>
        <!--first time using article element-->
        <section id="upcoming-events">
            <h2>Upcoming Events</h2>
                <article>
                    <h3>Upcoming Event 1</h3>
                    <p>Learn about article elements</P>
                </article>
                <article>
                    <h3>pcoming Event 2</h3>
                    <p>Learn about article elements</P>
                </article>
        </section>
        <!--I think im getting the hang of this-->
        <section id="past-events">
            <h2>Past Events</h2>
                <article>
                    <h3>Past Event 1</h3>
                    <p>Learned about HTML semantics</p>
                    <image src="https://cdn.freecodecamp.org/curriculum/labs/past-event1.jpg" alt="image description">
                </article>
                <article>
                    <h3>Past Event 2</h3>
                    <p>Learned about HTML semantics</p>
                    <image src="https://cdn.freecodecamp.org/curriculum/labs/past-event2.jpg" alt="image description">
                </article>
        </section>
    </main>
</body>

</html>
